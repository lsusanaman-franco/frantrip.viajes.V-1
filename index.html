<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Turnos Profesional</title>
    <style>
        /* CSS Integrado para evitar fallos de ruta */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor-tabla {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 90%;
            width: 800px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            text-align: left;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        tbody tr:nth-child(even) {
            background-color: #fbfcfc;
        }

        tbody tr:hover {
            background-color: #f1f7fe;
        }

        /* Responsive: Se adapta a celulares */
        @media screen and (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            
            tr { border: 1px solid #ccc; margin-bottom: 10px; }
            
            td {
                border: none;
                border-bottom: 1px solid #eee;
                position: relative;
                padding-left: 50%;
                text-align: right;
            }
            
            td:before {
                position: absolute;
                top: 15px;
                left: 15px;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                content: attr(data-label);
                font-weight: bold;
                text-align: left;
                color: #2c3e50;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor-tabla">
        <h2>Registro de Turnos</h2>
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Cliente</th>
                    <th>Servicio</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="Fecha">25/05/2024</td>
                    <td data-label="Hora">09:00 AM</td>
                    <td data-label="Cliente">Juan Pérez</td>
                    <td data-label="Servicio">Corte de Cabello</td>
                </tr>
                <tr>
                    <td data-label="Fecha">25/05/2024</td>
                    <td data-label="Hora">10:30 AM</td>
                    <td data-label="Cliente">María García</td>
                    <td data-label="Servicio">Manicura</td>
                </tr>
                <tr>
                    <td data-label="Fecha">26/05/2024</td>
                    <td data-label="Hora">11:00 AM</td>
                    <td data-label="Cliente">Carlos Rodríguez</td>
                    <td data-label="Servicio">Barba y Afeitado</td>
                </tr>
                <tr>
                    <td data-label="Fecha">26/05/2024</td>
                    <td data-label="Hora">15:00 PM</td>
                    <td data-label="Cliente">Ana Martínez</td>
                    <td data-label="Servicio">Tinte y Peinado</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
